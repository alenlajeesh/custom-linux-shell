name: Build cshell

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get install build-essential

      - name: Build project
        run: make

      - name: Run tests
        run: ./tests/basic_tests.sh
